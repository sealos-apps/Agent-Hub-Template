id: cowagent
name: CowAgent
shortName: CowAgent
description: CowAgent Web console assistant with skills, memory, tools, and multi-channel integrations.
image: ghcr.io/nightwhite/cowagent:latest
port: 9899
defaultArgs:
  - start
backendSupported: true
workingDir: /workspace
manifestDir: manifests
user: root
presentation:
  logoKey: cowagent
  brandColor: "#7c3aed"
  docsLabel: Web console
workspaces:
  - key: overview
    label: Overview
  - key: web-ui
    label: Web UI
  - key: files
    label: Files
  - key: settings
    label: Settings
access:
  - key: web-ui
    label: Web UI
    path: /
  - key: terminal
    label: Terminal
  - key: files
    label: Files
    rootPath: /workspace
  - key: ssh
    label: SSH
actions:
  - key: open-terminal
    label: Terminal
  - key: open-files
    label: Files
  - key: open-settings
    label: Settings
  - key: run
    label: Start
  - key: pause
    label: Pause
  - key: delete
    label: Delete
settings:
  runtime:
    - key: cpu
      label: CPU
      type: quantity
      required: true
      binding:
        kind: runtime
        key: cpu
    - key: memory
      label: Memory
      type: quantity
      required: true
      binding:
        kind: runtime
        key: memory
    - key: storage
      label: Storage
      type: quantity
      required: true
      binding:
        kind: runtime
        key: storage
  agent:
    - key: webPassword
      label: Web Password
      type: text
      required: false
      binding:
        kind: env
        name: COWAGENT_WEB_PASSWORD
    - key: keySource
      label: Key Source
      type: text
      readOnly: true
      binding:
        kind: derived
        key: keySource
modelIntegration:
  type: ai-agent-switch
  client: cowagent
  provider:
    id: aiproxy
    name:
      zh: AI Proxy
      en: AI Proxy
    baseURL:
      source: workspace
    apiKeyEnv: OPEN_AI_API_KEY
  slots:
    - key: main
      label:
        zh: 主模型
        en: Main model
      required: true
      mutable: true
      defaultModels:
        us: gpt-5.5
        cn: qwen3.6-plus
      modelTypes: [text]
    - key: vision
      label:
        zh: 视觉理解模型
        en: Vision model
      required: true
      mutable: true
      defaultModels:
        us: gpt-5.5
        cn: qwen3.6-plus
      modelTypes: [vision]
    - key: image
      label:
        zh: 图片生成模型
        en: Image generation model
      required: true
      mutable: true
      defaultModels:
        us: gpt-image-2
        cn: qwen-image-2.0-pro
      modelTypes: [image]
    - key: asr
      label:
        zh: 语音识别模型
        en: Speech-to-text model
      required: false
      mutable: true
      defaultModels:
        us: gpt-4o-mini-transcribe
        cn: qwen3-asr-flash
      modelTypes: [asr]
    - key: tts
      label:
        zh: 语音合成模型
        en: Text-to-speech model
      required: false
      mutable: true
      defaultModels:
        us: gpt-4o-mini-tts
        cn: qwen3-tts-flash
      modelTypes: [tts]
    - key: embedding
      label:
        zh: 向量模型
        en: Embedding model
      required: false
      mutable: true
      defaultModels:
        us: text-embedding-3-large
        cn: text-embedding-v4
      modelTypes: [embedding]
regionModelTypes:
  us:
    - key: text
      label: 普通模型
      models:
        - value: gpt-5.5
          label: GPT-5.5
          helper: OpenAI
          provider: custom:aiproxy-chat
          apiMode: chat_completions
          kind: llm
          runtimeProvider: openai
          capabilities: [chat, reasoning, agent]

id: openclaw
name: OpenClaw
shortName: OpenClaw
description: OpenClaw gateway adapter for browser automation agents with Web UI, terminal, files, and settings access.
image: ghcr.io/gitlayzer/openclaw:2026.5.19
port: 18789
defaultArgs:
  - start
backendSupported: true
workingDir: /workspace
manifestDir: manifests
user: agent
presentation:
  logoKey: openclaw
  brandColor: "#0f766e"
  docsLabel: Gateway + terminal
workspaces:
  - key: overview
    label: Overview
  - key: web-ui
    label: Web UI
  - key: files
    label: Files
  - key: settings
    label: Settings
access:
  - key: web-ui
    label: Web UI
    path: /
  - key: terminal
    label: Terminal
  - key: files
    label: Files
    rootPath: /workspace
  - key: ssh
    label: SSH
  - key: ide
    label: IDE
    modes:
      - cursor
      - vscode
      - zed
      - gateway
actions:
  - key: open-terminal
    label: Terminal
  - key: open-files
    label: Files
  - key: open-settings
    label: Settings
  - key: run
    label: Start
  - key: pause
    label: Pause
  - key: delete
    label: Delete
settings:
  runtime:
    - key: cpu
      label: CPU
      type: quantity
      required: true
      binding:
        kind: runtime
        key: cpu
    - key: memory
      label: Memory
      type: quantity
      required: true
      binding:
        kind: runtime
        key: memory
    - key: storage
      label: Storage
      type: quantity
      required: true
      binding:
        kind: runtime
        key: storage
  agent:
    - key: provider
      label: Provider
      type: select
      required: true
      binding:
        kind: agent
        key: modelProvider
      rebootstrap: true
      options:
        - value: custom:aiproxy-chat
          label: AI-Proxy - Chat Completions
        - value: custom:aiproxy-responses
          label: AI-Proxy - Responses API
        - value: custom:aiproxy-anthropic
          label: AI-Proxy - Anthropic Messages
    - key: model
      label: Model
      type: select
      required: true
      binding:
        kind: agent
        key: model
      rebootstrap: true
    - key: baseURL
      label: Base URL
      type: url
      required: true
      binding:
        kind: agent
        key: modelBaseURL
      rebootstrap: true
    - key: gatewayToken
      label: Gateway Token
      type: text
      required: true
      binding:
        kind: env
        name: OPENCLAW_GATEWAY_TOKEN
      rebootstrap: true
    - key: keySource
      label: Key Source
      type: text
      readOnly: true
      binding:
        kind: derived
        key: keySource
regionModelTypes:
  us:
    - key: text
      label: 普通模型
      models:
        - value: gpt-5.5
          label: GPT-5.5
          helper: OpenAI
          provider: custom:aiproxy-responses
          apiMode: codex_responses
          capabilities: [reasoning, code]
          inputModalities: [text]
          outputModalities: [text]
        - value: claude-opus-4-7
          label: Claude Opus 4.7
          helper: Anthropic
          provider: custom:aiproxy-anthropic
          apiMode: anthropic_messages
          capabilities: [reasoning, vision]
          inputModalities: [text, image]
          outputModalities: [text]
        - value: glm-4.6
          label: GLM-4.6
          helper: GLM
          provider: custom:aiproxy-chat
          apiMode: chat_completions
          capabilities: [chat]
          inputModalities: [text]
          outputModalities: [text]
    - key: multimodal
      label: 多模态模型
      models:
        - value: glm-4.6v
          label: GLM-4.6V
          helper: GLM
          provider: custom:aiproxy-chat
          apiMode: chat_completions
          capabilities: [vision, multimodal]
          inputModalities: [text, image]
          outputModalities: [text]
    - key: image
      label: 生图模型
      models:
        - value: gpt-image-2
          label: GPT Image 2
          helper: OpenAI
          provider: custom:aiproxy-responses
          apiMode: image_generation
          capabilities: [image_generation]
          inputModalities: [text, image]
          outputModalities: [image]
  cn:
    - key: text
      label: 普通模型
      models:
        - value: glm-5.1
          label: GLM-5.1
          helper: GLM
          provider: custom:aiproxy-chat
          apiMode: chat_completions
          capabilities: [chat, reasoning]
          inputModalities: [text]
          outputModalities: [text]
        - value: kimi-k2.6
          label: Kimi K2.6
          helper: Kimi
          provider: custom:aiproxy-chat
          apiMode: chat_completions
          capabilities: [chat, reasoning]
          inputModalities: [text]
          outputModalities: [text]
        - value: deepseek-v4-pro
          label: DeepSeek V4 Pro
          helper: DeepSeek
          provider: custom:aiproxy-chat
          apiMode: chat_completions
          capabilities: [chat, reasoning]
          inputModalities: [text]
          outputModalities: [text]
        - value: qwen3-max
          label: Qwen3 Max
          helper: Qwen
          provider: custom:aiproxy-chat
          apiMode: chat_completions
          capabilities: [chat, reasoning]
          inputModalities: [text]
          outputModalities: [text]
    - key: multimodal
      label: 多模态模型
      models:
        - value: qwen3-vl-plus
          label: Qwen3 VL Plus
          helper: Qwen
          provider: custom:aiproxy-chat
          apiMode: chat_completions
          capabilities: [vision, multimodal]
          inputModalities: [text, image]
          outputModalities: [text]
    - key: image
      label: 生图模型
      models:
        - value: cogview-4
          label: CogView 4
          helper: GLM
          provider: custom:aiproxy-chat
          apiMode: image_generation
          capabilities: [image_generation]
          inputModalities: [text]
          outputModalities: [image]

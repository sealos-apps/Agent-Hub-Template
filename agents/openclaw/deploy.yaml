apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
        - name: openclaw
          image: ghcr.io/nightwhite/openclaw:dev-9be0d3087285
          imagePullPolicy: IfNotPresent
          args: ["start"]
          workingDir: /workspace
          env:
            - name: AGENT_PORT
              value: "18789"
            - name: AGENT_LOG_LEVEL
              value: "info"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
          ports:
            - name: http
              containerPort: 18789
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: openclaw-data
              mountPath: /home/agent/.openclaw
      volumes:
        - name: workspace
          emptyDir: {}
        - name: openclaw-data
          emptyDir: {}
---
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-secrets
  labels:
    app: openclaw
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: agent
type: Opaque
stringData:
  gateway-token: change-me
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  labels:
    app: openclaw
    app.kubernetes.io/name: openclaw
    app.kubernetes.io/component: agent
spec:
  selector:
    app: openclaw
  ports:
    - name: http
      port: 18789
      targetPort: http

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
  labels:
    app: hermes-agent
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      containers:
        - name: hermes-agent
          image: ghcr.io/gitlayzer/hermes-agent:dev-95e56bbc43d7
          imagePullPolicy: IfNotPresent
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              value: "change-me-local-dev"
            - name: AGENT_PORT
              value: "8642"
            - name: AGENT_LOG_LEVEL
              value: "info"
          args: ["start"]
          workingDir: /workspace
          ports:
            - name: http
              containerPort: 8642
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: hermes-data
              mountPath: /home/agent/.hermes
      volumes:
        - name: workspace
          emptyDir: {}
        - name: hermes-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-agent
  labels:
    app: hermes-agent
    app.kubernetes.io/name: hermes-agent
    app.kubernetes.io/component: agent
spec:
  selector:
    app: hermes-agent
  ports:
    - name: http
      port: 8642
      targetPort: http

id: hermes-agent
name: Hermes Agent
shortName: Hermes
description: Hermes Agent gateway for Agent Hub with API, terminal, file, SSH, and IDE access.
image: ghcr.io/gitlayzer/hermes-agent:0.14.0
port: 8642
defaultArgs:
  - start
backendSupported: true
workingDir: /workspace
manifestDir: manifests
user: agent
presentation:
  logoKey: hermes-agent
  brandColor: "#2563eb"
  docsLabel: API + terminal
workspaces:
  - key: overview
    label: Overview
  - key: chat
    label: Chat
  - key: files
    label: Files
  - key: settings
    label: Settings
access:
  - key: api
    label: API
    path: /v1
    auth: apiKey
  - key: terminal
    label: Terminal
  - key: files
    label: Files
    rootPath: /workspace
  - key: ssh
    label: SSH
  - key: ide
    label: IDE
    modes:
      - cursor
      - vscode
      - zed
      - gateway
actions:
  - key: open-chat
    label: Chat
  - key: open-terminal
    label: Terminal
  - key: open-files
    label: Files
  - key: open-settings
    label: Settings
  - key: run
    label: Start
  - key: pause
    label: Pause
  - key: delete
    label: Delete
settings:
  runtime:
    - key: cpu
      label: CPU
      type: quantity
      required: true
      binding:
        kind: runtime
        key: cpu
    - key: memory
      label: Memory
      type: quantity
      required: true
      binding:
        kind: runtime
        key: memory
    - key: storage
      label: Storage
      type: quantity
      required: true
      binding:
        kind: runtime
        key: storage
  agent:
    - key: provider
      label: Provider
      type: select
      required: true
      binding:
        kind: agent
        key: modelProvider
      rebootstrap: true
      options:
        - value: custom:aiproxy-chat
          label: AI-Proxy - Chat Completions
        - value: custom:aiproxy-responses
          label: AI-Proxy - Responses API
        - value: custom:aiproxy-anthropic
          label: AI-Proxy - Anthropic Messages
    - key: model
      label: Model
      type: select
      required: true
      binding:
        kind: agent
        key: model
      rebootstrap: true
    - key: baseURL
      label: Base URL
      type: url
      required: true
      binding:
        kind: agent
        key: modelBaseURL
      rebootstrap: true
    - key: keySource
      label: Key Source
      type: text
      readOnly: true
      binding:
        kind: derived
        key: keySource
regionModelPresets:
  us:
    - value: gpt-5.4
      label: GPT-5.4
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: codex_responses
    - value: gpt-5.4-mini
      label: GPT-5.4 Mini
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: codex_responses
    - value: claude-sonnet-4.6
      label: Claude Sonnet 4.6
      helper: Anthropic
      provider: custom:aiproxy-anthropic
      apiMode: anthropic_messages
    - value: glm-4.6
      label: GLM-4.6
      helper: GLM
      provider: custom:aiproxy-chat
      apiMode: chat_completions
    - value: qwen3-coder-plus
      label: Qwen3 Coder Plus
      helper: Qwen
      provider: custom:aiproxy-chat
      apiMode: chat_completions
  cn:
    - value: glm-4.6
      label: GLM-4.6
      helper: GLM
      provider: custom:aiproxy-chat
      apiMode: chat_completions
    - value: qwen3-coder-plus
      label: Qwen3 Coder Plus
      helper: Qwen
      provider: custom:aiproxy-chat
      apiMode: chat_completions
    - value: gpt-5.4-mini
      label: GPT-5.4 Mini
      helper: OpenAI
      provider: custom:aiproxy-responses
      apiMode: codex_responses

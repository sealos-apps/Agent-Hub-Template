name: build-agent-adapters

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      ai_agent_switch_source_url:
        description: Optional ai-agent-switch source repository URL.
        required: false
        default: ''
      ai_agent_switch_source_ref:
        description: Optional ai-agent-switch source ref. Required when source URL is set.
        required: false
        default: ''

permissions:
  contents: read
  packages: read

env:
  AGENT_BASE_IMAGE: agent-hub/agent-devbox-base:ci-${{ github.run_id }}

jobs:
  prepare:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
      ai-agent-switch-version: ${{ steps.ai-agent-switch.outputs.version }}
      ai-agent-switch-metadata: ${{ steps.ai-agent-switch.outputs.metadata }}
      ai-agent-switch-source-url: ${{ steps.ai-agent-switch.outputs.source-url }}
      ai-agent-switch-source-ref: ${{ steps.ai-agent-switch.outputs.source-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate agent contracts
        run: bash test/validate-agent-contract.sh

      - name: Resolve ai-agent-switch version
        id: ai-agent-switch
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_URL_INPUT: ${{ github.event.inputs.ai_agent_switch_source_url || '' }}
          SOURCE_REF_INPUT: ${{ github.event.inputs.ai_agent_switch_source_ref || '' }}
        run: |
          version="$(npm view ai-agent-switch version)"
          if [ -z "$version" ]; then
            echo "failed to resolve ai-agent-switch version" >&2
            exit 1
          fi
          source_url="$SOURCE_URL_INPUT"
          source_ref="$SOURCE_REF_INPUT"
          if [ -z "$source_url" ] && [ -n "$source_ref" ]; then
            source_url="https://github.com/sealos-apps/ai-agent-switch.git"
          fi
          if [ -z "$source_url" ] && [ -z "$source_ref" ] && { [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; }; then
            source_url="https://github.com/sealos-apps/ai-agent-switch.git"
            source_ref="9d78561ecbd35ce775f7acfe70e3bdb6617b9b51"
          fi
          if [ -n "$source_url" ] && [ -z "$source_ref" ]; then
            echo "ai-agent-switch source ref is required when source url is set" >&2
            exit 1
          fi
          if [ -z "$source_url" ] && [ -n "$source_ref" ]; then
            echo "ai-agent-switch source url is required when source ref is set" >&2
            exit 1
          fi
          metadata="$version"
          if [ -n "$source_ref" ]; then
            metadata="${version}+source.${source_ref}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "metadata=$metadata" >> "$GITHUB_OUTPUT"
          echo "source-url=$source_url" >> "$GITHUB_OUTPUT"
          echo "source-ref=$source_ref" >> "$GITHUB_OUTPUT"

      - name: Generate agent matrix
        id: matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before || '' }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import subprocess
          from pathlib import Path


          def load_yaml(path: Path) -> object:
              try:
                  import yaml
              except ModuleNotFoundError:
                  result = subprocess.run(
                      [
                          "ruby",
                          "-rjson",
                          "-ryaml",
                          "-e",
                          "puts JSON.generate(YAML.safe_load(File.read(ARGV[0]), permitted_classes: [], permitted_symbols: [], aliases: true))",
                          str(path),
                      ],
                      check=True,
                      text=True,
                      stdout=subprocess.PIPE,
                  )
                  return json.loads(result.stdout)
              return yaml.safe_load(path.read_text(encoding="utf-8"))


          def parse_registry(path: Path) -> list[dict[str, object]]:
              data = load_yaml(path)
              if not isinstance(data, dict):
                  raise SystemExit(f"{path}: top-level YAML must be a mapping")
              items = data.get("agents")
              if not isinstance(items, list):
                  raise SystemExit(f"{path}: agents must be a list")
              for index, item in enumerate(items):
                  if not isinstance(item, dict):
                      raise SystemExit(f"{path}: agents[{index}] must be a mapping")
              return items


          def is_all_zero(value: str) -> bool:
              return bool(value) and set(value) == {"0"}


          def git_changed_files(base: str, head: str) -> list[str]:
              if not base or not head or is_all_zero(base):
                  return []
              result = subprocess.run(
                  ["git", "diff", "--name-only", f"{base}...{head}"],
                  check=True,
                  text=True,
                  stdout=subprocess.PIPE,
              )
              return [line for line in result.stdout.splitlines() if line]


          agents = [
              {"name": item["name"], "path": item["path"]}
              for item in parse_registry(Path("registry/agents.yaml"))
              if item.get("name") and item.get("path") and Path(str(item["path"]), "Dockerfile").exists()
          ]

          event_name = os.environ.get("EVENT_NAME", "")
          build_all_from_ref = False
          if event_name == "pull_request":
              changed_files = git_changed_files(
                  os.environ.get("PR_BASE_SHA", ""),
                  os.environ.get("PR_HEAD_SHA", ""),
              )
          elif event_name == "push":
              build_all_from_ref = is_all_zero(os.environ.get("BEFORE_SHA", ""))
              changed_files = git_changed_files(
                  os.environ.get("BEFORE_SHA", ""),
                  os.environ.get("HEAD_SHA", ""),
              )
          else:
              changed_files = []

          build_all = (
              event_name == "workflow_dispatch"
              or build_all_from_ref
              or "registry/agents.yaml" in changed_files
              or ".gitmodules" in changed_files
              or ".github/workflows/build.yml" in changed_files
              or any(path == "devbox-runtime" or path.startswith("devbox-runtime/") for path in changed_files)
              or any(path.startswith("base/") for path in changed_files)
              or any(path.startswith("agents/_template/") for path in changed_files)
          )

          if build_all:
              selected = agents
          else:
              selected = [
                  agent
                  for agent in agents
                  if any(
                      path == str(agent["path"]) or path.startswith(f"{agent['path']}/")
                      for path in changed_files
                  )
              ]

          print(f"matrix={json.dumps({'include': selected}, separators=(',', ':'))}")
          print(f"count={len(selected)}")
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary_path:
              selected_names = ", ".join(str(item["name"]) for item in selected) or "(none)"
              Path(summary_path).write_text(
                  f"### Agent build matrix\n\n"
                  f"- Event: `{event_name}`\n"
                  f"- Selected agents: {selected_names}\n"
                  f"- Changed files: {len(changed_files)}\n",
                  encoding="utf-8",
              )
          PY

  build-base:
    needs: prepare
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate base shell scripts
        run: |
          find base -type f -name '*.sh' | sort | while IFS= read -r file; do
            bash -n "$file"
          done

      - name: Build base image
        run: |
          docker build \
            --file base/Dockerfile \
            --tag "$AGENT_BASE_IMAGE" \
            .

      - name: Verify base image
        run: IMAGE="$AGENT_BASE_IMAGE" bash base/smoke.sh

  build:
    needs:
      - prepare
      - build-base
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate agent shell scripts
        run: |
          find "${{ matrix.path }}" -type f -name '*.sh' | sort | while IFS= read -r file; do
            bash -n "$file"
          done

      - name: Build local base image
        run: |
          docker build \
            --file base/Dockerfile \
            --tag "$AGENT_BASE_IMAGE" \
            .

      - name: Build agent image
        run: |
          docker build \
            --build-arg "AGENT_BASE_IMAGE=${AGENT_BASE_IMAGE}" \
            --build-arg "AI_AGENT_SWITCH_VERSION=${{ needs.prepare.outputs['ai-agent-switch-version'] }}" \
            --build-arg "AI_AGENT_SWITCH_METADATA=${{ needs.prepare.outputs['ai-agent-switch-metadata'] }}" \
            --build-arg "AI_AGENT_SWITCH_SOURCE_URL=${{ needs.prepare.outputs['ai-agent-switch-source-url'] }}" \
            --build-arg "AI_AGENT_SWITCH_SOURCE_REF=${{ needs.prepare.outputs['ai-agent-switch-source-ref'] }}" \
            --file "${{ matrix.path }}/Dockerfile" \
            --tag "agent-hub/${{ matrix.name }}:ci-${{ github.run_id }}" \
            .

      - name: Verify Agent Hub init command
        run: |
          image="agent-hub/${{ matrix.name }}:ci-${{ github.run_id }}"
          expected="${{ needs.prepare.outputs['ai-agent-switch-version'] }}"
          expected_metadata="${{ needs.prepare.outputs['ai-agent-switch-metadata'] }}"
          case "${{ matrix.name }}" in
            cowagent)
              verify_client="cowagent"
              verify_api_key_env="OPEN_AI_API_KEY"
              ;;
            hermes-agent)
              verify_client="hermes"
              verify_api_key_env="AIPROXY_API_KEY"
              ;;
            *)
              verify_client="${{ matrix.name }}"
              verify_api_key_env="AIPROXY_API_KEY"
              ;;
          esac
          output="$(
            docker run --rm \
              -e "VERIFY_CLIENT=${verify_client}" \
              -e "VERIFY_API_KEY_ENV=${verify_api_key_env}" \
              "$image" bash -lc '
              set -euo pipefail
              verify_home="$(mktemp -d)"
              trap "rm -rf \"$verify_home\"" EXIT
              HOME="$verify_home" ai-agent-switch agent-hub init \
                --client "$VERIFY_CLIENT" \
                --provider-id verify-aiproxy \
                --provider-name Verify \
                --model-type openai-chat-compatible \
                --base-url http://127.0.0.1:1/v1 \
                --api-key-env "$VERIFY_API_KEY_ENV" \
                --model verify-model \
                --available-model verify-model \
                --json
            '
          )"
          printf '%s' "$output" | grep -F '"requiresConfirmation": true' >/dev/null
          actual="$(docker image inspect "$image" --format '{{ index .Config.Labels "org.sealos.ai-agent-switch.version" }}')"
          test "$actual" = "$expected"
          actual_metadata="$(docker image inspect "$image" --format '{{ index .Config.Labels "org.sealos.ai-agent-switch.metadata" }}')"
          test "$actual_metadata" = "$expected_metadata"

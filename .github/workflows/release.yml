name: release-enabled-agents

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  AGENT_BASE_IMAGE_NAME: agent-devbox-base
  AGENT_BASE_IMAGE_VERSION: 0.1.0

jobs:
  prepare:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
      owner: ${{ steps.owner.outputs.owner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate agent contracts
        run: bash test/validate-agent-contract.sh

      - name: Resolve owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Generate agent matrix from registry
        id: matrix
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import subprocess
          from pathlib import Path

          def load_yaml(path: Path) -> object:
              try:
                  import yaml
              except ModuleNotFoundError:
                  result = subprocess.run(
                      [
                          "ruby",
                          "-rjson",
                          "-ryaml",
                          "-e",
                          "puts JSON.generate(YAML.safe_load(File.read(ARGV[0]), permitted_classes: [], permitted_symbols: [], aliases: true))",
                          str(path),
                      ],
                      check=True,
                      text=True,
                      stdout=subprocess.PIPE,
                  )
                  return json.loads(result.stdout)
              return yaml.safe_load(path.read_text(encoding="utf-8"))

          registry_path = Path("registry/agents.yaml")
          data = load_yaml(registry_path)
          if not isinstance(data, dict):
              raise SystemExit(f"{registry_path}: top-level YAML must be a mapping")
          items = data.get("agents")
          if not isinstance(items, list):
              raise SystemExit(f"{registry_path}: agents must be a list")
          for index, item in enumerate(items):
              if not isinstance(item, dict):
                  raise SystemExit(f"{registry_path}: agents[{index}] must be a mapping")

          enabled = []
          owner = os.environ["GITHUB_REPOSITORY_OWNER"].lower()
          for item in items:
              if item.get("enabled") is not True:
                  continue
              path = Path(item["path"])
              template = load_yaml(path / "template.yaml")
              if not isinstance(template, dict):
                  raise SystemExit(f"{path / 'template.yaml'}: top-level YAML must be a mapping")
              image = str(template.get("image") or "")
              expected_image = f"ghcr.io/{owner}/{item['name']}:latest"
              if image != expected_image:
                  raise SystemExit(f"{path / 'template.yaml'}: image must be {expected_image}")
              enabled.append(
                  {
                      "name": item["name"],
                      "path": item["path"],
                  }
              )

          print(f"matrix={json.dumps({'include': enabled}, separators=(',', ':'))}")
          print(f"count={len(enabled)}")
          PY

  release-base:
    needs: prepare
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate base shell scripts
        run: |
          find base -type f -name '*.sh' | sort | while IFS= read -r file; do
            bash -n "$file"
          done

      - name: Build base image
        env:
          IMAGE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:${{ env.AGENT_BASE_IMAGE_VERSION }}
          LATEST_IMAGE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:latest
        run: |
          docker build \
            --file base/Dockerfile \
            --tag "$IMAGE" \
            --tag "$LATEST_IMAGE" \
            .

      - name: Verify base image
        env:
          IMAGE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:${{ env.AGENT_BASE_IMAGE_VERSION }}
        run: bash base/smoke.sh

      - name: Push base image
        env:
          IMAGE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:${{ env.AGENT_BASE_IMAGE_VERSION }}
          LATEST_IMAGE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:latest
        run: |
          docker push "$IMAGE"
          docker push "$LATEST_IMAGE"

  release:
    needs:
      - prepare
      - release-base
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        run: |
          short_sha="$(printf '%s' "$GITHUB_SHA" | cut -c1-12)"
          trace_tag="build-$(date -u +%Y%m%d)-${short_sha}"
          {
            echo "tags<<EOF"
            echo "latest"
            echo "$trace_tag"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release image
        env:
          IMAGE_BASE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ matrix.name }}
          IMAGE_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            tag_args+=(--tag "${IMAGE_BASE}:${tag}")
          done <<< "$IMAGE_TAGS"

          docker build \
            --build-arg "AGENT_BASE_IMAGE=ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}" \
            --file "${{ matrix.path }}/Dockerfile" \
            "${tag_args[@]}" \
            .

      - name: Push image
        env:
          IMAGE_BASE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ matrix.name }}
          IMAGE_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            docker push "${IMAGE_BASE}:${tag}"
          done <<< "$IMAGE_TAGS"

  sync-latest-templates:
    needs:
      - prepare
      - release
    if: github.event_name == 'push' && github.ref_type == 'branch' && needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync latest image refs
        env:
          OWNER: ${{ needs.prepare.outputs.owner }}
          MATRIX: ${{ needs.prepare.outputs.matrix }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          owner = os.environ["OWNER"]
          matrix = json.loads(os.environ["MATRIX"])
          for item in matrix["include"]:
              name = str(item["name"])
              path = Path(str(item["path"]))
              image = f"ghcr.io/{owner}/{name}:latest"

              template_path = path / "template.yaml"
              if template_path.exists():
                  template = template_path.read_text()
                  template = re.sub(r"(^image:\s*).+$", rf"\1{image}", template, count=1, flags=re.MULTILINE)
                  template_path.write_text(template)
          PY

      - name: Commit synced templates
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agents/*/template.yaml
          git commit -m "chore: sync agent latest image refs"
          git push origin "HEAD:${GITHUB_REF_NAME}"

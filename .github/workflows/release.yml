name: release-enabled-agents

on:
  workflow_dispatch:
    inputs:
      ai_agent_switch_source_url:
        description: Optional ai-agent-switch source repository URL.
        required: false
        default: ''
      ai_agent_switch_source_ref:
        description: Optional ai-agent-switch source ref. Required when source URL is set.
        required: false
        default: ''
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  AGENT_BASE_IMAGE_NAME: agent-devbox-base
  AGENT_BASE_IMAGE_VERSION: 0.1.0

jobs:
  prepare:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}
      owner: ${{ steps.owner.outputs.owner }}
      ai-agent-switch-version: ${{ steps.ai-agent-switch.outputs.version }}
      ai-agent-switch-metadata: ${{ steps.ai-agent-switch.outputs.metadata }}
      ai-agent-switch-source-url: ${{ steps.ai-agent-switch.outputs.source-url }}
      ai-agent-switch-source-ref: ${{ steps.ai-agent-switch.outputs.source-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate agent contracts
        run: bash test/validate-agent-contract.sh

      - name: Resolve owner
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve ai-agent-switch version
        id: ai-agent-switch
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_URL_INPUT: ${{ github.event.inputs.ai_agent_switch_source_url || '' }}
          SOURCE_REF_INPUT: ${{ github.event.inputs.ai_agent_switch_source_ref || '' }}
        run: |
          version="$(npm view ai-agent-switch version)"
          if [ -z "$version" ]; then
            echo "failed to resolve ai-agent-switch version" >&2
            exit 1
          fi
          source_url="$SOURCE_URL_INPUT"
          source_ref="$SOURCE_REF_INPUT"
          if [ -z "$source_url" ] && [ -n "$source_ref" ]; then
            source_url="https://github.com/sealos-apps/ai-agent-switch.git"
          fi
          if [ -z "$source_url" ] && [ -z "$source_ref" ] && { [ "$EVENT_NAME" = "push" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; }; then
            source_url="https://github.com/sealos-apps/ai-agent-switch.git"
            source_ref="9d78561ecbd35ce775f7acfe70e3bdb6617b9b51"
          fi
          if [ -n "$source_url" ] && [ -z "$source_ref" ]; then
            echo "ai-agent-switch source ref is required when source url is set" >&2
            exit 1
          fi
          if [ -z "$source_url" ] && [ -n "$source_ref" ]; then
            echo "ai-agent-switch source url is required when source ref is set" >&2
            exit 1
          fi
          metadata="$version"
          if [ -n "$source_ref" ]; then
            metadata="${version}+source.${source_ref}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "metadata=$metadata" >> "$GITHUB_OUTPUT"
          echo "source-url=$source_url" >> "$GITHUB_OUTPUT"
          echo "source-ref=$source_ref" >> "$GITHUB_OUTPUT"

      - name: Generate agent matrix from registry
        id: matrix
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import subprocess
          from pathlib import Path

          def load_yaml(path: Path) -> object:
              try:
                  import yaml
              except ModuleNotFoundError:
                  result = subprocess.run(
                      [
                          "ruby",
                          "-rjson",
                          "-ryaml",
                          "-e",
                          "puts JSON.generate(YAML.safe_load(File.read(ARGV[0]), permitted_classes: [], permitted_symbols: [], aliases: true))",
                          str(path),
                      ],
                      check=True,
                      text=True,
                      stdout=subprocess.PIPE,
                  )
                  return json.loads(result.stdout)
              return yaml.safe_load(path.read_text(encoding="utf-8"))

          registry_path = Path("registry/agents.yaml")
          data = load_yaml(registry_path)
          if not isinstance(data, dict):
              raise SystemExit(f"{registry_path}: top-level YAML must be a mapping")
          items = data.get("agents")
          if not isinstance(items, list):
              raise SystemExit(f"{registry_path}: agents must be a list")
          for index, item in enumerate(items):
              if not isinstance(item, dict):
                  raise SystemExit(f"{registry_path}: agents[{index}] must be a mapping")

          enabled = []
          for item in items:
              if item.get("enabled") is not True:
                  continue
              index = json.loads(Path(item["path"], "index.json").read_text())
              enabled.append(
                  {
                      "name": item["name"],
                      "path": item["path"],
                      "version": index["version"],
                      "image_tag": index.get("image_tag"),
                  }
              )

          print(f"matrix={json.dumps({'include': enabled}, separators=(',', ':'))}")
          print(f"count={len(enabled)}")
          PY

  release-base:
    needs: prepare
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate base shell scripts
        run: |
          find base -type f -name '*.sh' | sort | while IFS= read -r file; do
            bash -n "$file"
          done

      - name: Build base image
        env:
          IMAGE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:${{ env.AGENT_BASE_IMAGE_VERSION }}
        run: |
          docker build \
            --file base/Dockerfile \
            --tag "$IMAGE" \
            .

      - name: Verify base image
        env:
          IMAGE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:${{ env.AGENT_BASE_IMAGE_VERSION }}
        run: bash base/smoke.sh

      - name: Push base image
        env:
          IMAGE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:${{ env.AGENT_BASE_IMAGE_VERSION }}
        run: docker push "$IMAGE"

  release:
    needs:
      - prepare
      - release-base
    if: needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        env:
          AGENT_VERSION: ${{ matrix.version }}
          AGENT_IMAGE_TAG: ${{ matrix.image_tag || '' }}
        run: |
          tag="${AGENT_IMAGE_TAG:-$AGENT_VERSION}"
          {
            echo "tags<<EOF"
            echo "$tag"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release image
        env:
          IMAGE_BASE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ matrix.name }}
          IMAGE_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            tag_args+=(--tag "${IMAGE_BASE}:${tag}")
          done <<< "$IMAGE_TAGS"

          docker build \
            --build-arg "AGENT_BASE_IMAGE=ghcr.io/${{ needs.prepare.outputs.owner }}/${{ env.AGENT_BASE_IMAGE_NAME }}:${{ env.AGENT_BASE_IMAGE_VERSION }}" \
            --build-arg "AI_AGENT_SWITCH_VERSION=${{ needs.prepare.outputs['ai-agent-switch-version'] }}" \
            --build-arg "AI_AGENT_SWITCH_METADATA=${{ needs.prepare.outputs['ai-agent-switch-metadata'] }}" \
            --build-arg "AI_AGENT_SWITCH_SOURCE_URL=${{ needs.prepare.outputs['ai-agent-switch-source-url'] }}" \
            --build-arg "AI_AGENT_SWITCH_SOURCE_REF=${{ needs.prepare.outputs['ai-agent-switch-source-ref'] }}" \
            --file "${{ matrix.path }}/Dockerfile" \
            "${tag_args[@]}" \
            .

      - name: Push image
        env:
          IMAGE_BASE: ghcr.io/${{ needs.prepare.outputs.owner }}/${{ matrix.name }}
          IMAGE_TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            docker push "${IMAGE_BASE}:${tag}"
          done <<< "$IMAGE_TAGS"

  sync-version-templates:
    needs:
      - prepare
      - release
    if: github.event_name == 'push' && github.ref_type == 'branch' && needs.prepare.outputs.count != '0'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync version image refs
        env:
          OWNER: ${{ needs.prepare.outputs.owner }}
          MATRIX: ${{ needs.prepare.outputs.matrix }}
          AI_AGENT_SWITCH_METADATA: ${{ needs.prepare.outputs.ai-agent-switch-metadata }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          owner = os.environ["OWNER"]
          matrix = json.loads(os.environ["MATRIX"])
          for item in matrix["include"]:
              name = str(item["name"])
              path = Path(str(item["path"]))
              tag = str(item.get("image_tag") or item["version"])
              image = f"ghcr.io/{owner}/{name}:{tag}"
              base_image = f"ghcr.io/{owner}/agent-devbox-base:0.1.0"

              index_path = path / "index.json"
              index = json.loads(index_path.read_text())
              index["image"] = image
              index["base_image"] = base_image
              index["ai_agent_switch_version"] = os.environ["AI_AGENT_SWITCH_METADATA"]
              index_path.write_text(json.dumps(index, indent=2) + "\n")

              template_path = path / "template.yaml"
              if template_path.exists():
                  template = template_path.read_text()
                  template = re.sub(r"(^image:\s*).+$", rf"\1{image}", template, count=1, flags=re.MULTILINE)
                  template_path.write_text(template)
          PY

      - name: Commit synced templates
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add agents/*/index.json agents/*/template.yaml
          git commit -m "chore: sync agent version image refs"
          git push origin "HEAD:${GITHUB_REF_NAME}"
